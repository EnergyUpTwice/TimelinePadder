name: Release Plugin

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# 必须包含以下三个权限，且必须全部小写
permissions:
  id-token: write
  contents: write
  attestations: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Restore NuGet packages
        run: nuget restore TimelinePadder.csproj

      - name: Build project
        run: msbuild TimelinePadder.csproj -t:rebuild -property:Configuration=Release -property:Platform="Any CPU"

      - name: Zip the DLL
        shell: pwsh
        run: |
          Compress-Archive -Path "bin\Any CPU\Release\net48\TimelinePadder.dll" -DestinationPath TimelinePadder.zip

      # 新增：安全签名步骤，对生成的 zip 进行溯源签名
      - name: Attest Build Provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: 'TimelinePadder.zip'

      - name: Create GitHub Release & Upload
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "TimelinePadder ${{ github.ref_name }}"
          body: |
            ## 安装方法
            下载 `TimelinePadder.zip`，解压后将 DLL 放入 Subtitle Edit 的 `Plugins` 文件夹。
            
            > **安全提示**：此发布版本已包含 GitHub 原生 Attestation 签名，确保构建过程未被篡改。
          files: TimelinePadder.zip
          draft: false
          prerelease: false
